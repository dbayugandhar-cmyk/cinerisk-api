<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CINEOS — Release Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:     #07090c;
  --bg2:    #0c0f14;
  --bg3:    #111620;
  --bg4:    #171e2a;
  --border: rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --gold:   #c9a84c;
  --gold2:  #e8c96a;
  --red:    #d94f4f;
  --green:  #3db87a;
  --blue:   #5b9cf6;
  --text:   #dde1e8;
  --text2:  #7a8494;
  --text3:  #3a4150;
  --display:'Bebas Neue',sans-serif;
  --mono:   'DM Mono',monospace;
  --sans:   'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex}

/* ── Sidebar ── */
.sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.logo{padding:20px 16px 18px;border-bottom:1px solid var(--border)}
.logo-mark{font-family:var(--display);font-size:24px;letter-spacing:2px;line-height:1}
.logo-mark span{color:var(--gold)}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.15em;margin-top:3px;text-transform:uppercase}
.nav{padding:12px 8px;flex:1}
.nav-label{font-family:var(--mono);font-size:9px;letter-spacing:.15em;color:var(--text3);text-transform:uppercase;padding:0 8px;margin:10px 0 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 8px;border-radius:5px;cursor:pointer;color:var(--text2);font-size:12px;font-weight:400;transition:all .15s;border:1px solid transparent}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(201,168,76,.1);color:var(--gold);border-color:rgba(201,168,76,.2)}
.nav-item svg{width:14px;height:14px;flex-shrink:0}
.api-status{padding:12px 16px;border-top:1px solid var(--border)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);display:inline-block;margin-right:6px;transition:background .3s}
.status-dot.online{background:var(--green);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.status-text{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.topbar-title{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn{padding:7px 14px;border-radius:5px;font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--bg3);color:var(--text);transition:all .15s}
.btn:hover{background:var(--bg4)}
.btn-gold{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.btn-gold:hover{background:var(--gold2)}
.content{flex:1;overflow-y:auto;padding:24px}

/* ── Screens ── */
.screen{display:none}.screen.active{display:block}

/* ── KPI strip ── */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--kc,var(--gold));opacity:.5}
.kpi-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-family:var(--display);font-size:30px;letter-spacing:1px;line-height:1}
.kpi-delta{font-family:var(--mono);font-size:10px;color:var(--text3);margin-top:4px}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border)}
.card-title{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--text2);text-transform:uppercase}
.card-body{padding:18px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── Simulate form ── */
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:10px;align-items:flex-end;margin-bottom:0}
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--text3);text-transform:uppercase}
select,input[type=number],input[type=text]{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:8px 10px;font-family:var(--sans);font-size:12px;color:var(--text);outline:none;width:100%;transition:border-color .15s;appearance:none}
select:focus,input:focus{border-color:var(--gold)}

/* ── Result cards ── */
.strat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.strat-card{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:14px;transition:border-color .2s;position:relative}
.strat-card.recommended{border-color:var(--green);background:rgba(61,184,122,.04)}
.strat-card.current{border-color:var(--gold);background:rgba(201,168,76,.04)}
.strat-tag{font-family:var(--mono);font-size:9px;letter-spacing:.1em;border-radius:3px;padding:2px 7px;display:inline-block;margin-bottom:8px;font-weight:500}
.tag-rec{background:rgba(61,184,122,.15);color:var(--green)}
.tag-cur{background:rgba(201,168,76,.15);color:var(--gold)}
.strat-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px}
.strat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.strat-row:last-child{border-bottom:none}
.sl{color:var(--text3);font-family:var(--mono);font-size:10px}
.sv{font-weight:500}
.sv.r{color:var(--red)}.sv.g{color:var(--green)}.sv.gold{color:var(--gold)}

/* ── Risk bar ── */
.rbar-wrap{width:100%;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:6px 0 10px}
.rbar-fill{height:100%;border-radius:3px;transition:width .8s ease}

/* ── Explanation ── */
.expl-list{list-style:none;display:flex;flex-direction:column;gap:7px}
.expl-list li{font-size:12px;color:var(--text2);line-height:1.6;padding-left:14px;position:relative}
.expl-list li::before{content:'';position:absolute;left:0;top:7px;width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.7}

/* ── Confidence badge ── */
.conf-badge{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}

/* ── Loading ── */
.loading-state{text-align:center;padding:48px;color:var(--text3)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--mono);font-size:11px;letter-spacing:.1em}
.loading-text::after{content:'...';animation:dots 1.2s steps(3,end) infinite}
@keyframes dots{0%,100%{content:'.'}33%{content:'..'}66%{content:'...'}}

/* ── Error state ── */
.error-state{background:rgba(217,79,79,.08);border:1px solid rgba(217,79,79,.2);border-radius:7px;padding:16px;color:var(--red);font-size:13px;margin-bottom:14px}
.error-title{font-weight:600;margin-bottom:4px}
.error-body{color:var(--text2);font-size:12px}

/* ── Rec box ── */
.rec-box{background:rgba(61,184,122,.06);border:1px solid rgba(61,184,122,.2);border-left:3px solid var(--green);border-radius:0 7px 7px 0;padding:14px 16px;margin-bottom:14px}
.rec-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--green);text-transform:uppercase;margin-bottom:6px}
.rec-text{font-size:13px;color:var(--text);line-height:1.6}

/* ── Empty state ── */
.empty-state{text-align:center;padding:48px;color:var(--text3)}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4}
.empty-text{font-family:var(--mono);font-size:11px;letter-spacing:.08em}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">CINE<span>RISK</span></div>
    <div class="logo-sub">Release Intelligence</div>
  </div>
  <nav class="nav">
    <div class="nav-label">Analysis</div>
    <div class="nav-item active" onclick="showScreen('simulate',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      Simulate
    </div>
    <div class="nav-item" onclick="showScreen('compare',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 3v18h18"/><path d="M7 16l4-4 4 4 4-6"/></svg>
      Compare
    </div>
    <div class="nav-label">Reference</div>
    <div class="nav-item" onclick="showScreen('genres',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Genre Index
    </div>
  </nav>
  <div class="api-status">
    <span class="status-dot" id="apiDot"></span>
    <span class="status-text" id="apiText">Checking API...</span>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-title" id="screenTitle">Simulation Engine</div>
    <div class="topbar-right">
      <span class="conf-badge" id="engineBadge">Engine v1</span>
      <button class="btn btn-gold" onclick="showScreen('simulate',document.querySelector('.nav-item'))">+ New Simulation</button>
    </div>
  </header>

  <div class="content">

    <!-- ── SIMULATE ── -->
    <div id="screen-simulate" class="screen active">
      <div class="card">
        <div class="card-hdr">
          <span class="card-title">Film Parameters</span>
          <span class="conf-badge">3 inputs · engine calculates the rest</span>
        </div>
        <div class="card-body">
          <div class="form-row">
            <div class="fg">
              <label class="fl">Genre</label>
              <select id="i-genre">
                <option value="action">Action</option>
                <option value="scifi">Sci-Fi</option>
                <option value="thriller">Thriller</option>
                <option value="horror">Horror</option>
                <option value="animation">Animation</option>
                <option value="drama">Drama</option>
              </select>
            </div>
            <div class="fg">
              <label class="fl">Hype Level</label>
              <select id="i-hype">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="fg">
              <label class="fl">Current Strategy</label>
              <select id="i-strategy">
                <option value="global_day1">Global Day-One</option>
                <option value="staggered" selected>Staggered</option>
                <option value="streaming_delay">Streaming Delay</option>
              </select>
            </div>
            <div class="fg">
              <label class="fl">Budget ($M)</label>
              <input type="number" id="i-budget" value="150" min="1" max="2000">
            </div>
            <button class="btn btn-gold" onclick="runSimulation()" style="white-space:nowrap;height:36px">Run →</button>
          </div>
        </div>
      </div>

      <div id="sim-results">
        <div class="empty-state">
          <div class="empty-icon">◎</div>
          <div class="empty-text">Set parameters above and click Run</div>
        </div>
      </div>
    </div>

    <!-- ── COMPARE ── -->
    <div id="screen-compare" class="screen">
      <div class="card">
        <div class="card-hdr"><span class="card-title">Strategy Comparison</span></div>
        <div class="card-body">
          <div class="form-row">
            <div class="fg">
              <label class="fl">Genre</label>
              <select id="c-genre">
                <option value="action">Action</option>
                <option value="scifi">Sci-Fi</option>
                <option value="thriller">Thriller</option>
                <option value="horror">Horror</option>
                <option value="animation">Animation</option>
                <option value="drama">Drama</option>
              </select>
            </div>
            <div class="fg">
              <label class="fl">Hype</label>
              <select id="c-hype">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="fg">
              <label class="fl">Budget ($M)</label>
              <input type="number" id="c-budget" value="150" min="1" max="2000">
            </div>
            <div class="fg">
              <label class="fl">Film Title</label>
              <input type="text" id="c-title" placeholder="Optional">
            </div>
            <button class="btn btn-gold" onclick="runCompare()" style="white-space:nowrap;height:36px">Compare →</button>
          </div>
        </div>
      </div>
      <div id="cmp-results">
        <div class="empty-state">
          <div class="empty-icon">◈</div>
          <div class="empty-text">Compare all 3 release strategies side by side</div>
        </div>
      </div>
    </div>

    <!-- ── GENRE INDEX ── -->
    <div id="screen-genres" class="screen">
      <div id="genre-content">
        <div class="loading-state"><div class="spinner"></div><div class="loading-text">Loading</div></div>
      </div>
    </div>

  </div>
</div>

<script>
const API = 'https://cinerisk-api-production.up.railway.app';

// ── API health check ──────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`, {signal: AbortSignal.timeout(3000)});
    const d = await r.json();
    document.getElementById('apiDot').className = 'status-dot online';
    document.getElementById('apiText').textContent = 'API online';
    document.getElementById('engineBadge').textContent = `Engine ${d.version}`;
  } catch {
    document.getElementById('apiDot').className = 'status-dot';
    document.getElementById('apiText').textContent = 'API offline';
  }
}
checkHealth();
setInterval(checkHealth, 10000);

// ── Navigation ────────────────────────────────────────────────────────
const titles = {simulate:'Simulation Engine', compare:'Strategy Comparison', genres:'Genre Risk Index'};
function showScreen(id, el) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
  if(el) el.classList.add('active');
  document.getElementById('screenTitle').textContent = titles[id]||id;
  if(id==='genres') loadGenres();
}

// ── Risk helpers ──────────────────────────────────────────────────────
function riskColor(score) {
  if(score >= 0.70) return 'var(--red)';
  if(score >= 0.45) return 'var(--gold)';
  return 'var(--green)';
}
function riskClass(score) {
  if(score >= 0.70) return 'r';
  if(score >= 0.45) return 'gold';
  return 'g';
}
function stratLabel(s) {
  return {global_day1:'Global Day-One', staggered:'Staggered', streaming_delay:'Streaming Delay'}[s]||s;
}

// ── Render strategy cards ─────────────────────────────────────────────
function renderStratCards(strategies, recommended, current) {
  return strategies.map(s => {
    const isRec = s.strategy === recommended;
    const isCur = s.strategy === current;
    const rc = riskColor(s.risk_score);
    return `
    <div class="strat-card ${isRec?'recommended':''} ${isCur&&!isRec?'current':''}">
      ${isRec ? '<span class="strat-tag tag-rec">RECOMMENDED</span>' : ''}
      ${isCur && !isRec ? '<span class="strat-tag tag-cur">CURRENT</span>' : ''}
      <div class="strat-name">${stratLabel(s.strategy)}</div>
      <div class="rbar-wrap"><div class="rbar-fill" style="width:${s.risk_score*100}%;background:${rc}"></div></div>
      <div class="strat-row">
        <span class="sl">Risk Score</span>
        <span class="sv ${riskClass(s.risk_score)}">${s.risk_score.toFixed(2)} · ${s.risk_label}</span>
      </div>
      <div class="strat-row">
        <span class="sl">Revenue Range</span>
        <span class="sv g">$${s.revenue_low}M – $${s.revenue_high}M</span>
      </div>
      <div class="strat-row">
        <span class="sl">Leak Window</span>
        <span class="sv r">Day ${s.leak_day_low}–${s.leak_day_high}</span>
      </div>
      <div class="strat-row">
        <span class="sl">Confidence</span>
        <span class="sv" style="color:var(--text2)">${(s.confidence*100).toFixed(0)}%</span>
      </div>
    </div>`;
  }).join('');
}

// ── Render explanation ────────────────────────────────────────────────
function renderExplanation(strategies, current) {
  const cur = strategies.find(s => s.strategy === current) || strategies[0];
  return `
  <div class="card">
    <div class="card-hdr">
      <span class="card-title">Why This Result — ${stratLabel(current)}</span>
      <span class="conf-badge">${(cur.confidence*100).toFixed(0)}% confidence</span>
    </div>
    <div class="card-body">
      <ul class="expl-list">
        ${cur.explanation.map(e=>`<li>${e}</li>`).join('')}
      </ul>
    </div>
  </div>`;
}

// ── Render chart ──────────────────────────────────────────────────────
let chartInst = null;
function renderChart(strategies, canvasId) {
  setTimeout(() => {
    const ctx = document.getElementById(canvasId);
    if(!ctx) return;
    if(chartInst) { chartInst.destroy(); chartInst = null; }
    chartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: strategies.map(s => stratLabel(s.strategy)),
        datasets: [
          {
            label: 'Revenue High ($M)',
            data: strategies.map(s => s.revenue_high),
            backgroundColor: 'rgba(61,184,122,0.6)',
            borderRadius: 3,
          },
          {
            label: 'Revenue Low ($M)',
            data: strategies.map(s => s.revenue_low),
            backgroundColor: 'rgba(61,184,122,0.25)',
            borderRadius: 3,
          },
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: '#7a8494', font: { family: 'DM Mono', size: 10 } } }
        },
        scales: {
          x: { ticks: { color: '#3a4150', font: { family: 'DM Mono', size: 10 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { ticks: { color: '#3a4150', font: { family: 'DM Mono', size: 10 }, callback: v=>'$'+v+'M' }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });
  }, 50);
}

// ── Run simulation ────────────────────────────────────────────────────
async function runSimulation() {
  const genre    = document.getElementById('i-genre').value;
  const hype     = document.getElementById('i-hype').value;
  const strategy = document.getElementById('i-strategy').value;
  const budget   = parseFloat(document.getElementById('i-budget').value)||100;

  document.getElementById('sim-results').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">Running simulation</div>
    </div>`;

  try {
    const res = await fetch(`${API}/simulate`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({genre, hype, strategy, budget_m: budget})
    });

    if(!res.ok) throw new Error(`API returned ${res.status}`);
    const data = await res.json();

    document.getElementById('sim-results').innerHTML = `
      <!-- KPIs from engine -->
      <div class="kpis">
        <div class="kpi" style="--kc:${riskColor(data.strategies.find(s=>s.strategy===data.current_strategy).risk_score)}">
          <div class="kpi-label">Current Risk</div>
          <div class="kpi-val" style="color:${riskColor(data.strategies.find(s=>s.strategy===data.current_strategy).risk_score)}">
            ${data.strategies.find(s=>s.strategy===data.current_strategy).risk_score.toFixed(2)}
          </div>
          <div class="kpi-delta">${data.strategies.find(s=>s.strategy===data.current_strategy).risk_label}</div>
        </div>
        <div class="kpi" style="--kc:var(--green)">
          <div class="kpi-label">Revenue Range</div>
          <div class="kpi-val" style="font-size:18px;color:var(--green)">
            $${data.strategies.find(s=>s.strategy===data.current_strategy).revenue_low}M–$${data.strategies.find(s=>s.strategy===data.current_strategy).revenue_high}M
          </div>
          <div class="kpi-delta">${stratLabel(data.current_strategy)}</div>
        </div>
        <div class="kpi" style="--kc:var(--red)">
          <div class="kpi-label">Est. Leak Window</div>
          <div class="kpi-val" style="font-size:22px;color:var(--red)">
            D+${data.strategies.find(s=>s.strategy===data.current_strategy).leak_day_low}–${data.strategies.find(s=>s.strategy===data.current_strategy).leak_day_high}
          </div>
          <div class="kpi-delta">first leak estimate</div>
        </div>
        <div class="kpi" style="--kc:var(--gold)">
          <div class="kpi-label">Recommended</div>
          <div class="kpi-val" style="font-size:16px;color:var(--gold)">${stratLabel(data.recommended)}</div>
          <div class="kpi-delta">${(data.strategies.find(s=>s.strategy===data.recommended).confidence*100).toFixed(0)}% confidence</div>
        </div>
      </div>

      <!-- Recommendation box -->
      <div class="rec-box">
        <div class="rec-label">Engine Recommendation</div>
        <div class="rec-text">${data.recommendation_text}</div>
      </div>

      <!-- Strategy cards -->
      <div class="strat-grid">
        ${renderStratCards(data.strategies, data.recommended, data.current_strategy)}
      </div>

      <!-- Chart + Explanation -->
      <div class="grid2">
        <div class="card">
          <div class="card-hdr"><span class="card-title">Revenue Range by Strategy</span></div>
          <div class="card-body"><canvas id="simChart" height="200"></canvas></div>
        </div>
        ${renderExplanation(data.strategies, data.current_strategy)}
      </div>`;

    renderChart(data.strategies, 'simChart');

  } catch(e) {
    document.getElementById('sim-results').innerHTML = `
      <div class="error-state">
        <div class="error-title">API not reachable</div>
        <div class="error-body">Make sure the CINEOS API is running: <code>python3 -m uvicorn api:app --reload --port 8000</code><br>Error: ${e.message}</div>
      </div>`;
  }
}

// ── Run compare ───────────────────────────────────────────────────────
async function runCompare() {
  const genre  = document.getElementById('c-genre').value;
  const hype   = document.getElementById('c-hype').value;
  const budget = parseFloat(document.getElementById('c-budget').value)||100;
  const title  = document.getElementById('c-title').value||null;

  document.getElementById('cmp-results').innerHTML = `
    <div class="loading-state"><div class="spinner"></div><div class="loading-text">Comparing strategies</div></div>`;

  try {
    const res = await fetch(`${API}/compare`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({genre, hype, strategy:'global_day1', budget_m: budget, film_title: title})
    });
    if(!res.ok) throw new Error(`API returned ${res.status}`);
    const data = await res.json();

    document.getElementById('cmp-results').innerHTML = `
      <div class="rec-box">
        <div class="rec-label">Engine Recommendation${title?' — '+title:''}</div>
        <div class="rec-text">${data.recommendation}</div>
      </div>
      <div class="card">
        <div class="card-hdr"><span class="card-title">All Strategies</span></div>
        <div class="card-body" style="padding:0">
          <table style="width:100%;border-collapse:collapse">
            <thead>
              <tr style="border-bottom:1px solid var(--border)">
                ${['Strategy','Risk','Risk Level','Revenue Range','Leak Window','Confidence'].map(h=>
                  `<th style="padding:10px 14px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--text3);text-align:left;text-transform:uppercase">${h}</th>`
                ).join('')}
              </tr>
            </thead>
            <tbody>
              ${data.comparison.map((s,i)=>`
              <tr style="background:${i%2===0?'var(--bg2)':'var(--bg3)'};border-bottom:1px solid var(--border)">
                <td style="padding:11px 14px">
                  <span style="font-size:12px;font-weight:500;color:var(--text)">${s.label}</span>
                  ${s.recommended?'<span class="strat-tag tag-rec" style="margin-left:6px;font-size:9px">REC</span>':''}
                  ${s.current?'<span class="strat-tag tag-cur" style="margin-left:6px;font-size:9px">CURRENT</span>':''}
                </td>
                <td style="padding:11px 14px;font-family:var(--mono);font-size:11px;color:${riskColor(s.risk)}">${s.risk.toFixed(2)}</td>
                <td style="padding:11px 14px;font-family:var(--mono);font-size:10px;color:${riskColor(s.risk)}">${s.risk_label}</td>
                <td style="padding:11px 14px;font-family:var(--mono);font-size:11px;color:var(--green)">${s.revenue_range}</td>
                <td style="padding:11px 14px;font-family:var(--mono);font-size:11px;color:var(--red)">${s.leak_window}</td>
                <td style="padding:11px 14px;font-family:var(--mono);font-size:11px;color:var(--text3)">${s.confidence}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('cmp-results').innerHTML = `
      <div class="error-state">
        <div class="error-title">API not reachable</div>
        <div class="error-body">Make sure the API is running on port 8000. Error: ${e.message}</div>
      </div>`;
  }
}

// ── Load genre index ──────────────────────────────────────────────────
async function loadGenres() {
  try {
    const r = await fetch(`${API}/genres`);
    const d = await r.json();
    document.getElementById('genre-content').innerHTML = `
      <div class="card">
        <div class="card-hdr"><span class="card-title">Genre Piracy Sensitivity Index</span></div>
        <div class="card-body" style="padding:0">
          <table style="width:100%;border-collapse:collapse">
            <thead><tr style="border-bottom:1px solid var(--border)">
              ${['Genre','Base Sensitivity','Risk Profile','Typical Revenue Mult'].map(h=>
                `<th style="padding:10px 14px;font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--text3);text-align:left;text-transform:uppercase">${h}</th>`
              ).join('')}
            </tr></thead>
            <tbody>
              ${d.genres.map((g,i)=>`
              <tr style="background:${i%2===0?'var(--bg2)':'var(--bg3)'};border-bottom:1px solid var(--border)">
                <td style="padding:12px 14px;font-size:13px;font-weight:500;color:var(--text)">${g.label}</td>
                <td style="padding:12px 14px">
                  <div style="display:flex;align-items:center;gap:10px">
                    <div style="width:100px;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden">
                      <div style="width:${g.sensitivity*100}%;height:100%;background:${riskColor(g.sensitivity)};border-radius:3px"></div>
                    </div>
                    <span style="font-family:var(--mono);font-size:11px;color:${riskColor(g.sensitivity)}">${(g.sensitivity*100).toFixed(0)}%</span>
                  </div>
                </td>
                <td style="padding:12px 14px">
                  <span style="font-family:var(--mono);font-size:10px;color:${riskColor(g.sensitivity)}">${g.sensitivity>=0.65?'HIGH':g.sensitivity>=0.45?'MEDIUM':'LOW'}</span>
                </td>
                <td style="padding:12px 14px;font-family:var(--mono);font-size:11px;color:var(--text2)">
                  ${{action:'2.8x',scifi:'2.5x',thriller:'1.9x',horror:'2.1x',drama:'1.5x',animation:'3.1x'}[g.id]||'2.0x'}
                </td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(e) {
    document.getElementById('genre-content').innerHTML = `
      <div class="error-state">
        <div class="error-title">Could not load genre data</div>
        <div class="error-body">API must be running. Error: ${e.message}</div>
      </div>`;
  }
}
</script>
</body>
